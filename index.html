<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1418">
    <title>Vibe OIO ONE</title>

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>

    <main id="app-container"></main>

    <div id="gaveta-explorer" class="gaveta-container">
        <div class="handle-area" onclick="fecharExplorer()"><div class="handle-bar"></div></div>
        <div class="gaveta-content">
            <h3 style="color:#2da1f8; margin-bottom:20px;">Vibe Explorer</h3>
            <div class="grid-apps">
                <div class="app-item" onclick="abrirTocVideos()">
                    <i class="fa-solid fa-play" style="color:#ff0050;"></i>
                    <span>Toc Vídeos</span>
                </div>
                <div class="app-item" onclick="abrirNostalgia()">
                    <i class="fa-solid fa-film" style="color:#ff9800;"></i>
                    <span>Nostalgia</span>
                </div>
                <div class="app-item" onclick="iniciarSnake()">
                    <i class="fa-solid fa-gamepad" style="color:#28a745;"></i>
                    <span>Jogos</span>
                </div>
                <div class="app-item" onclick="document.getElementById('videoInput').click()">
                    <i class="fa-solid fa-circle-plus" style="color:#2da1f8;"></i>
                    <span>Postar</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-chats" onclick="navegar('chats')">
            <i class="fa-solid fa-comment"></i><span>Chats</span>
        </div>
        <div class="nav-item" id="nav-explorar" onclick="abrirExplorer()">
            <i class="fa-solid fa-compass"></i><span>Explorer</span>
        </div>
        <div class="nav-item" id="nav-perfil" onclick="navegar('perfil')">
            <i class="fa-solid fa-user-circle"></i><span>Perfil</span>
        </div>
    </nav>

    <input type="file" id="fotoInput" style="display:none;" accept="image/*">
    <input type="file" id="videoInput" style="display:none;" accept="video/*">
    <input type="file" id="storyInput" style="display:none;" accept="image/*">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="js/notifications.js"></script>
    <script src="js/stories.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/explorer.js"></script>
    <script src="js/games.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/main.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado:', reg))
          .catch(err => console.error('Erro ao registrar SW:', err));
      }
    </script>

</body>
</html>
