<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | OIO ONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: radial-gradient(circle at top right, #001f3f, #000);
            display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; overflow: hidden;
        }

        .login-card {
            width: 85%; max-width: 350px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-vibe {
            font-size: 50px; color: #2da1f8;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(45, 161, 248, 0.5);
        }

        h2 { color: white; margin-bottom: 30px; font-weight: 300; }

        input {
            width: 90%; padding: 15px;
            background: rgba(255,255,255,0.1);
            border: none; border-radius: 12px;
            color: white; font-size: 16px;
            margin-bottom: 20px; outline: none;
            border: 1px solid transparent;
        }

        input:focus { border-color: #2da1f8; }

        button {
            width: 100%; padding: 15px;
            background: #2da1f8; border: none;
            border-radius: 12px; color: white;
            font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-vibe"><i class="fa-solid fa-bolt-lightning"></i></div>
        <h2>Vibe OIO ONE</h2>
        <input type="text" id="userNick" placeholder="Escolha seu Nickname..." autocomplete="off">
        <button onclick="entrarNoApp()">ENTRAR NO APP</button>
    </div>

    <script>
        function entrarNoApp() {
            const nick = document.getElementById('userNick').value;
            if (nick.length > 2) {
                localStorage.setItem("vibe_user", nick);
                window.location.href = "index.html";
            } else {
                alert("O nick precisa de pelo menos 3 letras!");
            }
        }

        // Se já tiver nick, pula o login
        if(localStorage.getItem("vibe_user")) {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
