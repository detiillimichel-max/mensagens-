<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b141a">
<title>VIBE APP</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#25d366;--g2:#128c7e;--bg:#0b141a;--s:#111b21;
  --c:#202c33;--card:#2a3942;--bdr:rgba(255,255,255,.07);
  --txt:#e9edef;--mu:#8696a0;--sent:#005c4b;--recv:#202c33;
  --red:#e53e3e;--ff:'Nunito',sans-serif;
}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;
  background:var(--bg);color:var(--txt);font-family:var(--ff);}

/* ═══════════════ LOGIN ═══════════════ */
#LOGIN{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;overflow-y:auto;
  padding:30px 18px 40px;gap:16px;
}
.vibe-logo{
  font-size:2rem;font-weight:800;letter-spacing:3px;
  color:var(--g);margin-top:10px;
}
.vibe-logo span{color:#fff;}
.l-sub{font-size:.82rem;color:var(--mu);}

.l-card{
  background:var(--s);border:1px solid var(--bdr);
  border-radius:18px;padding:18px;
  width:100%;max-width:360px;
  display:flex;flex-direction:column;gap:13px;
}
.l-lbl{font-size:.68rem;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;color:var(--mu);}

.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;
  max-height:200px;overflow-y:auto;scrollbar-width:none;}
.mgrid::-webkit-scrollbar{display:none;}
.mbtn{
  display:flex;align-items:center;gap:7px;padding:9px 11px;
  background:var(--card);border:2px solid transparent;
  border-radius:11px;cursor:pointer;font-family:var(--ff);
  color:var(--txt);font-size:.82rem;font-weight:600;transition:.15s;
}
.mbtn.sel{border-color:var(--g);background:rgba(37,211,102,.08);}
.mbtn:active{transform:scale(.97);}

.pdots{display:flex;gap:14px;justify-content:center;}
.dot{width:13px;height:13px;border-radius:50%;
  border:2px solid #4a5568;transition:.2s;}
.dot.on{background:var(--g);border-color:var(--g);transform:scale(1.1);}

.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.nk{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:13px;padding:14px 10px;font-size:1.2rem;
  font-weight:600;color:var(--txt);cursor:pointer;
  font-family:var(--ff);transition:.1s;text-align:center;
}
.nk:active{background:rgba(37,211,102,.2);transform:scale(.95);}
.nk.del{font-size:.9rem;color:var(--mu);}
.nk.go{background:var(--g2);color:#fff;font-weight:700;}
.nk.go:disabled{opacity:.3;}

.l-err{color:var(--red);font-size:.8rem;text-align:center;
  display:none;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ═══════════════ APP SHELL ═══════════════ */
#APP{
  display:none;flex-direction:column;
  height:100dvh;position:fixed;inset:0;
}

/* TOPBAR */
#topbar{
  background:var(--s);border-bottom:1px solid var(--bdr);
  padding-top:env(safe-area-inset-top,0);
  flex-shrink:0;display:flex;align-items:center;
  padding-bottom:0;
}
.topbar-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;width:100%;
}
.t-logo{display:flex;align-items:center;gap:10px;}
.t-av{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--g);display:flex;
  align-items:center;justify-content:center;
  font-size:1.2rem;background:var(--card);cursor:pointer;
  flex-shrink:0;
}
.t-name{font-size:1rem;font-weight:800;color:var(--g);letter-spacing:2px;}
.t-name span{color:#fff;}
.t-icons{display:flex;gap:6px;}
.t-btn{
  width:38px;height:38px;border-radius:50%;background:none;
  border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;color:var(--mu);
  transition:.15s;
}
.t-btn.active{color:var(--g);}
.t-btn:active{transform:scale(.85);background:var(--card);}
.t-online{
  background:var(--g);color:#000;font-size:.55rem;
  font-weight:800;border-radius:10px;padding:1px 5px;
}

/* BOTTOM NAV */
#bnav{
  background:var(--s);border-top:1px solid var(--bdr);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0);
  flex-shrink:0;
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 4px 6px;cursor:pointer;
  font-size:.65rem;color:var(--mu);font-weight:600;
  transition:.15s;border:none;background:none;
  font-family:var(--ff);
}
.bn.active{color:var(--g);}
.bn:active{transform:scale(.92);}
.bn-icon{font-size:1.3rem;line-height:1;}
.bn-dot{
  width:6px;height:6px;background:var(--g);
  border-radius:50%;position:absolute;top:6px;right:12px;
  display:none;
}
.bn.has-notif .bn-dot{display:block;}

/* SCREENS */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.screen.on{display:flex;}

/* ═══════════════ MEMBER BAR ═══════════════ */
#mbar{
  background:var(--s);border-bottom:1px solid var(--bdr);
  height:76px;display:flex;align-items:center;
  gap:10px;padding:0 14px;overflow-x:auto;
  flex-shrink:0;scrollbar-width:none;
}
#mbar::-webkit-scrollbar{display:none;}
.mc{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:pointer;flex-shrink:0;min-width:50px;
}
.mc-av{
  width:46px;height:46px;border-radius:50%;
  background:var(--card);display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;
  border:2.5px solid transparent;transition:.2s;
  position:relative;overflow:visible;
}
.mc.sel .mc-av{border-color:var(--g);box-shadow:0 0 0 2px rgba(37,211,102,.18);}
.mc-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.mc-nome{font-size:.58rem;color:var(--mu);max-width:50px;
  text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc.sel .mc-nome{color:var(--g);}
.onring{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;background:var(--g);
  border-radius:50%;border:2px solid var(--s);
}

/* ═══════════════ MESSAGES ═══════════════ */
#msgs{
  flex:1;overflow-y:auto;padding:10px 10px 4px;
  display:flex;flex-direction:column;gap:2px;
  scrollbar-width:none;
  background:var(--bg);
}
#msgs::-webkit-scrollbar{display:none;}

.dsep{
  text-align:center;margin:6px auto;
  background:rgba(11,20,26,.85);color:var(--mu);
  font-size:.67rem;border-radius:10px;
  padding:4px 14px;width:fit-content;
}

.mw{display:flex;flex-direction:column;max-width:84vw;
  animation:bIn .18s cubic-bezier(.34,1.4,.64,1);}
@keyframes bIn{from{opacity:0;transform:scale(.92) translateY(5px)}to{opacity:1;transform:none}}
.mw.me{align-self:flex-end;align-items:flex-end;}
.mw.them{align-self:flex-start;align-items:flex-start;}
.mw-autor{font-size:.68rem;font-weight:700;margin-bottom:2px;padding:0 3px;}

.bub{
  border-radius:10px;font-size:.9rem;line-height:1.45;
  position:relative;word-break:break-word;
  box-shadow:0 1px 2px rgba(0,0,0,.25);
}
.me .bub{background:var(--sent);border-top-right-radius:2px;}
.them .bub{background:var(--recv);border-top-left-radius:2px;}

/* text bub */
.bub-txt{padding:8px 11px;}
.bmeta{display:flex;align-items:center;justify-content:flex-end;
  gap:3px;margin-top:2px;}
.btime{font-size:.58rem;color:rgba(255,255,255,.38);}
.btick{font-size:.7rem;color:var(--g);}

/* image bub */
.bub-img{padding:4px;}
.bub-img img{width:210px;max-height:270px;object-fit:cover;
  border-radius:7px;display:block;cursor:pointer;}

/* audio bub */
.bub-aud{display:flex;align-items:center;gap:8px;
  padding:8px 11px;min-width:185px;}
.ap{
  width:36px;height:36px;border-radius:50%;border:none;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:.9rem;flex-shrink:0;
}
.me .ap{background:rgba(255,255,255,.15);color:#fff;}
.them .ap{background:var(--g);color:#000;}
.awav{flex:1;display:flex;align-items:center;gap:2px;height:24px;}
.ab{width:3px;border-radius:3px;flex-shrink:0;}
.me .ab{background:rgba(255,255,255,.28);}
.them .ab{background:rgba(37,211,102,.45);}
.adur{font-size:.68rem;color:rgba(255,255,255,.45);flex-shrink:0;}

/* sticker */
.bub-sticker{background:transparent !important;
  box-shadow:none !important;padding:4px;font-size:3.2rem;text-align:center;}

/* reply */
.rbub{
  background:rgba(37,211,102,.1);border-left:3px solid var(--g);
  border-radius:6px;padding:5px 9px;margin-bottom:5px;
}
.rbub-a{font-size:.66rem;font-weight:700;color:var(--g);}
.rbub-t{font-size:.73rem;color:var(--mu);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* reactions */
.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;padding:0 3px;}
.react{
  background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.18);
  border-radius:12px;padding:2px 7px;font-size:.78rem;
  cursor:pointer;display:flex;align-items:center;gap:2px;
}
.rcnt{font-size:.62rem;color:var(--mu);}

/* typing */
.typing{display:none;align-self:flex-start;background:var(--recv);
  border-radius:10px;border-top-left-radius:2px;
  padding:10px 14px;gap:4px;align-items:center;margin-bottom:2px;}
.typing.on{display:flex;}
.td{width:6px;height:6px;background:var(--mu);border-radius:50%;}
.td:nth-child(1){animation:td 1.2s infinite 0s}
.td:nth-child(2){animation:td 1.2s infinite .2s}
.td:nth-child(3){animation:td 1.2s infinite .4s}
@keyframes td{0%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}

/* ═══════════════ INPUT AREA ═══════════════ */
.input-area{background:var(--s);flex-shrink:0;
  border-top:1px solid var(--bdr);}

/* reply bar */
#rbar{display:none;padding:7px 14px;
  background:var(--c);border-bottom:1px solid var(--bdr);
  flex-direction:row;align-items:center;gap:9px;}
#rbar.on{display:flex;}
.rbar-body{flex:1;min-width:0;}
.rbar-a{font-size:.68rem;font-weight:700;color:var(--g);}
.rbar-t{font-size:.76rem;color:var(--mu);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rbar-x{background:none;border:none;cursor:pointer;
  color:var(--mu);font-size:1.1rem;}

/* rec bar */
#recbar{display:none;padding:11px 16px;
  background:var(--c);border-bottom:1px solid var(--bdr);
  flex-direction:row;align-items:center;gap:11px;}
#recbar.on{display:flex;}
.rdot{width:9px;height:9px;background:var(--red);
  border-radius:50%;animation:bk .7s infinite;flex-shrink:0;}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.rtime{font-size:1.1rem;font-weight:700;color:var(--red);
  letter-spacing:1px;flex:1;}
.rwav{display:flex;align-items:center;gap:2px;height:28px;flex:2;}
.rwb{width:3px;border-radius:3px;background:var(--g);
  min-height:3px;transition:height .08s;}
.rcrc{background:none;border:none;cursor:pointer;
  color:var(--mu);font-size:.82rem;font-family:var(--ff);}

/* emoji row */
#etray{display:none;padding:10px;flex-wrap:wrap;gap:2px;
  max-height:160px;overflow-y:auto;
  background:var(--c);border-bottom:1px solid var(--bdr);
  scrollbar-width:none;}
#etray.on{display:flex;}
.ek{font-size:1.4rem;cursor:pointer;padding:4px;
  border-radius:7px;transition:.1s;}
.ek:active{background:var(--card);}

/* media tray */
#mtray{display:none;padding:14px 18px 16px;gap:16px;
  background:var(--c);border-bottom:1px solid var(--bdr);}
#mtray.on{display:flex;}
.mto{display:flex;flex-direction:column;align-items:center;
  gap:5px;cursor:pointer;flex:1;}
.mto-ic{width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;transition:transform .15s;}
.mto-ic:active{transform:scale(.9);}
.mto span{font-size:.65rem;color:var(--mu);font-weight:600;}

/* input row */
#irow{display:flex;align-items:flex-end;gap:7px;padding:8px 10px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom,0));}
.iatt{width:42px;height:42px;background:none;border:none;
  cursor:pointer;color:var(--mu);font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.iatt:active{color:var(--g);}
.iwrap{flex:1;background:var(--card);border-radius:22px;
  padding:9px 13px;display:flex;align-items:flex-end;
  gap:7px;min-height:42px;}
#ti{flex:1;background:none;border:none;outline:none;
  color:var(--txt);font-size:.92rem;font-family:var(--ff);
  resize:none;max-height:96px;line-height:1.4;}
#ti::placeholder{color:var(--mu);}
.iemoji{background:none;border:none;cursor:pointer;
  font-size:1.25rem;flex-shrink:0;}
.imic{width:42px;height:42px;border-radius:50%;
  background:var(--card);border:none;cursor:pointer;
  color:var(--g);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.15s;}
.imic.rec{background:var(--red);color:#fff;
  animation:mpr .8s infinite;}
@keyframes mpr{0%,100%{box-shadow:0 0 0 0 rgba(229,62,62,.5)}
  50%{box-shadow:0 0 0 9px rgba(229,62,62,0)}}
.isend{width:42px;height:42px;border-radius:50%;
  background:var(--g2);border:none;cursor:pointer;color:#fff;
  font-size:1rem;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;display:none;}
.isend:active,.imic:active{transform:scale(.9);}

/* ═══════════════ CTX MENU ═══════════════ */
#ctxov{position:fixed;inset:0;z-index:500;display:none;}
#ctx{position:fixed;background:var(--c);border:1px solid var(--bdr);
  border-radius:14px;padding:5px;min-width:180px;z-index:501;
  box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;}
#ctx.on{display:block;animation:ctxIn .15s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.ctx-reacts{display:flex;gap:5px;padding:7px 11px;
  border-bottom:1px solid var(--bdr);margin-bottom:3px;}
.cr{font-size:1.3rem;cursor:pointer;padding:3px;
  border-radius:7px;transition:transform .15s;}
.cr:active{transform:scale(1.3);}
.ci{display:flex;align-items:center;gap:9px;padding:9px 13px;
  border-radius:9px;cursor:pointer;font-size:.85rem;transition:.1s;}
.ci:active{background:var(--card);}
.ci.del{color:var(--red);}

/* ═══════════════ MARKET ═══════════════ */
#sc-market{overflow-y:auto;}
.mkt-top{padding:14px 14px 8px;display:flex;
  align-items:center;justify-content:space-between;flex-shrink:0;}
.mkt-title{font-size:1.1rem;font-weight:800;color:var(--g);}
.mkt-add{background:var(--g2);border:none;border-radius:10px;
  padding:8px 14px;color:#fff;font-size:.82rem;font-weight:700;
  cursor:pointer;font-family:var(--ff);}
.mkt-cats{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;}
.mkt-cats::-webkit-scrollbar{display:none;}
.cat-btn{background:var(--card);border:1px solid var(--bdr);
  border-radius:20px;padding:6px 14px;font-size:.76rem;
  font-weight:600;color:var(--mu);cursor:pointer;
  white-space:nowrap;font-family:var(--ff);transition:.15s;}
.cat-btn.sel{background:var(--g2);color:#fff;border-color:var(--g2);}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:0 12px 80px;}
.pcard{background:var(--s);border:1px solid var(--bdr);
  border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s;}
.pcard:active{transform:scale(.97);}
.pcard-img{width:100%;aspect-ratio:1;background:var(--card);
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;overflow:hidden;}
.pcard-img img{width:100%;height:100%;object-fit:cover;}
.pcard-body{padding:9px 10px;}
.pcard-nome{font-size:.85rem;font-weight:700;color:var(--txt);}
.pcard-preco{font-size:.95rem;font-weight:800;color:var(--g);margin-top:3px;}
.pcard-vend{font-size:.66rem;color:var(--mu);margin-top:2px;}
.pcard-desc{font-size:.72rem;color:var(--mu);margin-top:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:600;display:none;align-items:flex-end;justify-content:center;}
#modal.on{display:flex;}
.modal-box{background:var(--s);border-radius:20px 20px 0 0;
  padding:18px;width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:11px;
  max-height:88dvh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:800;color:var(--g);}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:.66rem;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--mu);}
.field input,.field textarea,.field select{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:10px;padding:10px 13px;color:var(--txt);
  font-size:.88rem;font-family:var(--ff);outline:none;
}
.field select option{background:var(--card);}
.field textarea{resize:none;height:66px;}
.fbtn{background:var(--g2);border:none;border-radius:10px;
  padding:13px;color:#fff;font-size:.95rem;font-weight:700;
  cursor:pointer;font-family:var(--ff);}
.fbtn.sec{background:var(--card);color:var(--mu);}

/* PROD DETAIL */
#prod-detail{position:fixed;inset:0;background:var(--bg);
  z-index:550;display:none;flex-direction:column;overflow-y:auto;}
#prod-detail.on{display:flex;}
.pd-img{width:100%;aspect-ratio:1;background:var(--card);
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;max-height:50vw;overflow:hidden;}
.pd-img img{width:100%;height:100%;object-fit:cover;}
.pd-body{padding:18px;display:flex;flex-direction:column;gap:10px;}
.pd-nome{font-size:1.2rem;font-weight:800;}
.pd-preco{font-size:1.5rem;font-weight:800;color:var(--g);}
.pd-desc{font-size:.88rem;color:var(--mu);line-height:1.5;}
.pd-vend{display:flex;align-items:center;gap:8px;margin-top:4px;}
.pd-vend-av{width:34px;height:34px;border-radius:50%;
  background:var(--card);display:flex;align-items:center;
  justify-content:center;font-size:1.1rem;}
.pd-vend-info small{font-size:.68rem;color:var(--mu);}
.pd-vend-info p{font-size:.88rem;font-weight:600;}
.pd-actions{display:flex;gap:10px;margin-top:8px;}
.pd-btn{flex:1;padding:13px;border-radius:12px;border:none;
  font-size:.9rem;font-weight:700;cursor:pointer;font-family:var(--ff);}
.pd-btn.main{background:var(--g2);color:#fff;}
.pd-btn.sec{background:var(--card);color:var(--txt);}
.pd-close{position:absolute;top:calc(env(safe-area-inset-top,0)+10px);
  left:12px;background:rgba(0,0,0,.5);border:none;border-radius:50%;
  width:38px;height:38px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;color:#fff;font-size:1.1rem;}

/* IMAGE VIEWER */
#iv{position:fixed;inset:0;background:rgba(0,0,0,.96);
  z-index:700;display:none;align-items:center;
  justify-content:center;flex-direction:column;gap:14px;}
#iv.on{display:flex;}
#iv img{max-width:100%;max-height:88dvh;object-fit:contain;border-radius:8px;}
.iv-close{position:absolute;top:calc(env(safe-area-inset-top,0)+10px);

// ═══ STATE ═══
let user=null, chat='Geral', reply=null, ctxMsg=null;
let mr=null, ac=[], ri=null, wi=null, rs=0;
let online={}, lastDate=null, msgSub=null;
let prodImgUrl=null, prodImgFile=null, curProd=null;

// ═══ INIT LOGIN ═══
;(function(){
  // Build member grid
  document.getElementById('mgrid').innerHTML = MEMBROS.map((m,i)=>
    `<button class="mbtn" onclick="selM(${i})" id="mb${i}">
      <span style="font-size:1.2rem">${m.av}</span>${m.nome}
    </button>`
  ).join('');

  // Build numpad
  const keys=['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
  document.getElementById('npad').innerHTML = keys.map(k=>
    `<button class="nk${k==='⌫'?' del':''}${k==='✓'?' go':''}"

  if(saved){ try{ user=JSON.parse(saved); openApp(); }catch(e){ localStorage.removeItem('vibeapp_u'); } }
})();

let selIdx=null, pin='';
function selM(i){
  selIdx=i; pin=''; updDots();
  document.querySelectorAll('.mbtn').forEach((b,j)=>b.classList.toggle('sel',j===i));
  document.getElementById('lerr').style.display='none';
}
function np(k){
  if(selIdx===null){ showToast('👆 Selecione seu nome'); return; }
  if(k==='⌫'){ pin=pin.slice(0,-1); }
  else if(k==='✓'){ doLogin(); return; }
  else if(pin.length<4){ pin+=k; }
  updDots();
  const b=document.getElementById('okb');
  if(b) b.disabled = pin.length<4;
}
function updDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    if(d) d.classList.toggle('on', i<pin.length);
  }
}
function doLogin(){
  if(selIdx===null) return;
  const m=MEMBROS[selIdx];
  if(pin!==m.pin){
    const el=document.getElementById('lerr');
    el.style.display='block';
    el.style.animation='none'; el.offsetHeight; el.style.animation='';
    pin=''; updDots();
    const b=document.getElementById('okb'); if(b) b.disabled=true;
    return;
  }
  user=m;
  localStorage.setItem('vibeapp_u', JSON.stringify(m));
  openApp();
}

// ═══ OPEN APP ═══
function openApp(){
  // Hide login, show app
  document.getElementById('LOGIN').style.display='none';
  document.getElementById('APP').style.display='flex';

  // Set user avatar in topbar
  const av=document.getElementById('tav');
  if(user.foto){ av.innerHTML=`<img src="${user.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` }
  else{ av.textContent=user.av; av.style.background=user.cor+'33'; }

  // Presence
  sb.from('presence').upsert(
    {nome:user.nome,avatar:user.av,color:user.cor,online:true,last_seen:new Date().toISOString()},
    {onConflict:'nome'}
  );
  db_ref_cleanup();

  buildMbar();
  loadMsgs();
  subMsgs();
  subPresence();
  loadProds();
}

function logout(){
  if(user) sb.from('presence').update({online:false}).eq('nome',user.nome);
  if(msgSub){ try{ sb.removeChannel(msgSub); }catch(e){} }
  user=null; pin=''; selIdx=null; lastDate=null;
  localStorage.removeItem('vibeapp_u');
  document.getElementById('APP').style.display='none';
  document.getElementById('LOGIN').style.display='flex';
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('sel'));
  updDots();
}

let _hb;
function db_ref_cleanup(){
  clearInterval(_hb);
  _hb=setInterval(()=>{
    if(user) sb.from('presence').update({online:true,last_seen:new Date().toISOString()}).eq('nome',user.nome);
  },25000);
}

// ═══ PRESENCE ═══
function subPresence(){
  sb.channel('pres-ch')
    .on('postgres_changes',{event:'*',schema:'public',table:'presence'},()=>loadPresence())
    .subscribe();
  loadPresence();
}
async function loadPresence(){
  const{data}=await sb.from('presence').select('*').eq('online',true);
  online={};
  if(data) data.forEach(u=>online[u.nome]=u);
  const n=Object.keys(online).length;
  const ct=document.getElementById('online-ct');
  ct.textContent=n; ct.style.display=n?'inline':'none';
  buildMbar();
}

// ═══ MEMBER BAR ═══
function buildMbar(){
  const bar=document.getElementById('mbar');
  bar.innerHTML=CONVS.map(m=>`
    <div class="mc${chat===m.nome?' sel':''}" onclick="trocar('${m.nome}')">
      <div class="mc-av" style="border-color:${chat===m.nome?m.cor:'transparent'}">
        ${m.foto?`<img src="${m.foto}" onerror="this.outerHTML='${m.av}'">`:m.av}
        ${online[m.nome]?'<div class="onring"></div>':''}
      </div>
      <div class="mc-nome">${m.nome}</div>
    </div>
  `).join('');
}
function trocar(nome){
  chat=nome; lastDate=null;
  buildMbar(); loadMsgs(); subMsgs();
}

// ═══ MESSAGES ═══
async function loadMsgs(){
  if(msgSub){ try{ sb.removeChannel(msgSub); }catch(e){} }
  const wrap=document.getElementById('msgs');
  wrap.innerHTML='<div class="typing" id="tpi" style="display:none"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  lastDate=null;
  const{data}=await sb.from('messages').select('*')
    .eq('chat_room',chat)
    .eq('deleted',false)
    .order('created_at',{ascending:true})
    .limit(100);
  if(data) data.forEach(m=>renderMsg(m,false));
  scrollBot();
}
function subMsgs(){
  if(msgSub){ try{ sb.removeChannel(msgSub); }catch(e){} }
  msgSub=sb.channel('msgs-'+chat+'-'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},({new:m})=>{
      if(m.chat_room!==chat||m.deleted) return;
      renderMsg(m,true); scrollBot();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},({new:m})=>{
      if(m.chat_room!==chat) return;
      if(m.deleted){ document.getElementById('msg-'+m.id)?.remove(); return; }
      // update reactions
      const el=document.getElementById('msg-'+m.id);
      if(el){ const rc=el.querySelector('.reacts'); if(rc) buildReacts(rc,m); }
    })
    .subscribe();
}

// ═══ RENDER MSG ═══
function renderMsg(msg,isNew){
  const wrap=document.getElementById('msgs');
  const ti=document.getElementById('tpi');
  const mine=msg.author===user?.nome;

  // date separator
  const md=new Date(msg.created_at).toLocaleDateString('pt-BR');
  if(md!==lastDate){
    lastDate=md;
    const sep=document.createElement('div');
    sep.className='dsep';
    const d=new Date(msg.created_at),t=new Date(),y=new Date(+t-86400000);
    sep.textContent=d.toDateString()===t.toDateString()?'Hoje':d.toDateString()===y.toDateString()?'Ontem':d.toLocaleDateString('pt-BR');
    ti?wrap.insertBefore(sep,ti):wrap.appendChild(sep);
  }

  const g=document.createElement('div');
  g.className='mw '+(mine?'me':'them');
  g.id='msg-'+msg.id;

  if(!mine){
    const au=document.createElement('div');
    au.className='mw-autor';
    const mb=MEMBROS.find(x=>x.nome===msg.author);
    au.style.color=msg.color||'#25d366';
    au.textContent=(mb?.av||'👤')+' '+msg.author;
    g.appendChild(au);
  }

  const bub=document.createElement('div');
  const ts=new Date(msg.created_at);
  const tstr=`${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
  const tick=mine?'<span class="btick">✓✓</span>':'';

  // reply preview
  if(msg.reply_preview){
    const rp=document.createElement('div');
    rp.className='rbub';
    rp.innerHTML=`<div class="rbub-a">${esc(msg.reply_author||'')}</div><div class="rbub-t">${esc(msg.reply_preview)}</div>`;
    bub.appendChild(rp);
  }

  if(msg.type==='text'||!msg.type){
    bub.className='bub';
    const inner=document.createElement('div');
    inner.className='bub-txt';
    inner.innerHTML=`<span>${esc(msg.content||'')}</span><div class="bmeta"><span class="btime">${tstr}</span>${tick}</div>`;
    bub.appendChild(inner);
  } else if(msg.type==='image'){
    bub.className='bub bub-img';
    const img=document.createElement('img');
    img.src=msg.media_url; img.loading='lazy';
    img.onclick=()=>openIv(msg.media_url);
    bub.appendChild(img);
    const mt=document.createElement('div');
    mt.className='bub-txt';
    mt.innerHTML=`<div class="bmeta"><span class="btime">${tstr}</span>${tick}</div>`;
    bub.appendChild(mt);
  } else if(msg.type==='audio'){
    bub.className='bub bub-aud';
    const bars=Array.from({length:16},()=>`<div class="ab" style="height:${4+Math.floor(Math.random()*16)}px"></div>`).join('');
    bub.innerHTML=`
      <button class="ap" onclick="playAud(this,'${msg.media_url||''}')">▶</button>
      <div class="awav">${bars}</div>
      <span class="adur">${msg.duration||'0:00'}</span>
      <div class="bmeta"><span class="btime">${tstr}</span>${tick}</div>`;
  } else if(msg.type==='sticker'){
    bub.className='bub bub-sticker';
    bub.innerHTML=msg.content+`<div class="bmeta" style="justify-content:center"><span class="btime" style="color:var(--mu)">${tstr}</span></div>`;
  }

  g.appendChild(bub);

  // reactions
  const reacts=document.createElement('div');
  reacts.className='reacts';
  buildReacts(reacts,msg);
  g.appendChild(reacts);

  // long press
  let lpt;
  g.addEventListener('touchstart',()=>{lpt=setTimeout(()=>showCtx(g,msg),450);},{passive:true});
  g.addEventListener('touchend',()=>clearTimeout(lpt));
  g.addEventListener('touchmove',()=>clearTimeout(lpt),{passive:true});
  g.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(g,msg);});

  ti?wrap.insertBefore(g,ti):wrap.appendChild(g);
  if(isNew&&!mine) snd('recv');
}

function buildReacts(el,msg){
  el.innerHTML='';
  if(!msg.reactions) return;
  for(const[e,users] of Object.entries(msg.reactions)){
    if(users&&users.length){
      const r=document.createElement('div');
      r.className='react';
      r.innerHTML=`${e}<span class="rcnt">${users.length}</span>`;
      r.onclick=()=>addReact(msg.id,e);
      el.appendChild(r);
    }
  }
}

// ═══ AUDIO ═══
function toggleRec(){
  if(mr&&mr.state==='recording') stopRec(); else startRec();
}
async function startRec(){
  closeMtray();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    ac=[];
    const opts=MediaRecorder.isTypeSupported('audio/webm')?{mimeType:'audio/webm'}:{};
    mr=new MediaRecorder(stream,opts);
    mr.ondataavailable=e=>{if(e.data.size>0)ac.push(e.data);};
    mr.onstop=()=>finishRec(stream);
    mr.start(100); rs=0;
    document.getElementById('recbar').classList.add('on');
    document.getElementById('micbtn').classList.add('rec');
    const rw=document.getElementById('rwav');
    rw.innerHTML=Array.from({length:12},()=>'<div class="rwb" style="height:3px"></div>').join('');
    wi=setInterval(()=>rw.querySelectorAll('.rwb').forEach(b=>b.style.height=(3+Math.random()*22)+'px'),80);
    ri=setInterval(()=>{rs++;document.getElementById('rtime').textContent=fmt(rs);if(rs>=180)stopRec();},1000);
  }catch(e){ showToast('🎤 Permissão necessária'); }
}
function stopRec(){
  if(mr&&mr.state!=='inactive') mr.stop();
  clearInterval(ri);clearInterval(wi);
  document.getElementById('recbar').classList.remove('on');
  document.getElementById('micbtn').classList.remove('rec');
}
function cancelRec(){
  if(mr){mr.ondataavailable=null;mr.onstop=null;if(mr.state!=='inactive')mr.stop();mr.stream?.getTracks().forEach(t=>t.stop());}
  clearInterval(ri);clearInterval(wi);
  document.getElementById('recbar').classList.remove('on');
  document.getElementById('micbtn').classList.remove('rec');
  showToast('🗑 Cancelado');
}
async function finishRec(stream){
  stream.getTracks().forEach(t=>t.stop());
  const dur=fmt(rs);
  const mime=ac[0]?.type||'audio/webm';
  const blob=new Blob(ac,{type:mime});
  showUpl('Enviando áudio...');
  try{
    const ext=mime.includes('ogg')?'ogg':'webm';
    const path=`audio/${Date.now()}_${user.nome}.${ext}`;
    const{error}=await sb.storage.from('chat-media').upload(path,blob,{contentType:mime});
    if(error) throw error;
    const{data:{publicUrl}}=sb.storage.from('chat-media').getPublicUrl(path);
    await sendMedia(publicUrl,'audio',dur);
  }catch(e){ showToast('❌ '+e.message); }
  finally{ hideUpl(); }
}
function playAud(btn,url){
  if(!url){ showToast('🎤 Sem URL'); return; }
  const a=new Audio(url);
  btn.textContent='⏸'; a.play();
  a.onended=()=>{ btn.textContent='▶'; };
}

// ═══ REACTIONS ═══
async function addReact(id,emoji){
  const{data}=await sb.from('messages').select('reactions').eq('id',id).single();
  const reacts={...(data?.reactions||{})};
  if(!reacts[emoji]) reacts[emoji]=[];
  const idx=reacts[emoji].indexOf(user.nome);
  if(idx>=0) reacts[emoji].splice(idx,1);
  else reacts[emoji].push(user.nome);
  await sb.from('messages').update({reactions:reacts}).eq('id',id);
  closeCtx();
}

// ═══ CTX MENU ═══
function showCtx(el,msg){
  ctxMsg=msg;
  const mine=msg.author===user?.nome;
  const c=document.getElementById('ctx');
  c.innerHTML=`
    <div class="ctx-reacts">
      ${['❤️','😂','👍','🔥','😮','😢'].map(e=>`<div class="cr" onclick="addReact('${msg.id}','${e}')">${e}</div>`).join('')}
    </div>
    <div class="ci" onclick="setReply(ctxMsg)">↩ Responder</div>
    ${msg.type==='text'||!msg.type?`<div class="ci" onclick="copyMsg()">📋 Copiar</div>`:''}
    ${mine?`<div class="ci del" onclick="delMsg('${msg.id}')">🗑 Apagar</div>`:''}
  `;
  const r=el.getBoundingClientRect();
  const y=Math.min(r.top-8, window.innerHeight-260);
  c.style.left='12px'; c.style.right='12px';
  c.style.top=Math.max(60,y)+'px';
  c.classList.add('on');
  document.getElementById('ctxov').style.display='block';
}
function closeCtx(){ document.getElementById('ctx').classList.remove('on'); document.getElementById('ctxov').style.display='none'; ctxMsg=null; }
function copyMsg(){ if(ctxMsg?.content) navigator.clipboard?.writeText(ctxMsg.content).then(()=>showToast('✅ Copiado')); closeCtx(); }
async function delMsg(id){ await sb.from('messages').update({deleted:true}).eq('id',id); closeCtx(); }
function setReply(msg){
  reply={id:msg.id, preview:msg.type==='text'?msg.content:'📎 Mídia', author:msg.author};
  document.getElementById('rbar-a').textContent=msg.author;
  document.getElementById('rbar-t').textContent=reply.preview;
  document.getElementById('rbar').classList.add('on');

  closeCtx();
}
function clearReply(){ reply=null; document.getElementById('rbar').classList.remove('on'); }

function fmt(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// ═══ SOUND ═══
function snd(type){
  try{
    if(Actx.state==='suspended') Actx.resume();
    const o=Actx.createOscillator(),g=Actx.createGain();
    o.connect(g); g.connect(Actx.destination);
    if(type==='send'){ o.frequency.setValueAtTime(880,Actx.currentTime); o.frequency.exponentialRampToValueAtTime(1200,Actx.currentTime+.08); g.gain.setValueAtTime(.04,Actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,Actx.currentTime+.15); }
    else{ o.frequency.setValueAtTime(660,Actx.currentTime); o.frequency.exponentialRampToValueAtTime(880,Actx.currentTime+.07); g.gain.setValueAtTime(.05,Actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,Actx.currentTime+.2); }
    o.start(); o.stop(Actx.currentTime+.25);
  }catch(e){}
}
document.addEventListener('touchstart',()=>{ if(Actx.state==='suspended') Actx.resume(); },{once:true});
window.addEventListener('beforeunload',()=>{ if(user) sb.from('presence').update({online:false}).eq('nome',user.nome); });
document.getElementById('msgs')?.addEventListener('click',closeMtray);
